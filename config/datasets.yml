datasets:
  - name: yellow_taxi_trips
    enabled: true
    source_type: parquet
    source_url: "https://d37ci6vzurychx.cloudfront.net/trip-data/yellow_tripdata_{year}-{month}.parquet"
    local_path: "data/raw/yellow_taxi_trips/year={year}/month={month}/yellow_tripdata_{year}-{month}.parquet"
    target_schema: raw
    target_table: yellow_taxi_trips
    load_strategy: append
    partition_by:
      - year
      - month
    required_columns:
      - VendorID
      - tpep_pickup_datetime
      - tpep_dropoff_datetime
      - passenger_count
      - trip_distance
      - PULocationID
      - DOLocationID
      - payment_type
      - fare_amount
      - tip_amount
      - total_amount

  - name: taxi_zones
    enabled: true
    source_type: csv
    source_url: "https://d37ci6vzurychx.cloudfront.net/misc/taxi_zone_lookup.csv"
    local_path: "data/raw/taxi_zones/taxi_zone_lookup.csv"
    target_schema: raw
    target_table: taxi_zones
    load_strategy: replace
    required_columns:
      - LocationID
      - Borough
      - Zone
      - service_zone